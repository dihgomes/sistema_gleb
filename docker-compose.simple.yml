version: '3.3'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backup_upload:/backup
    networks:
      - gleb-network
    restart: unless-stopped

  backend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
      apk add --no-cache git &&
      git clone https://github.com/dihgomes/sistema_gleb.git . &&
      cd backend &&
      npm install &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      node src/server.js
      "
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SENHA: ${ADMIN_SENHA}
      FRONTEND_URL: https://sistema.gleb.scrb.org.br
    depends_on:
      - postgres
    networks:
      - gleb-network
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
      apk add --no-cache git &&
      git clone https://github.com/dihgomes/sistema_gleb.git . &&
      cd frontend &&
      npm install &&
      npm install -g serve &&
      npm run build &&
      serve -s dist -l 3000
      "
    environment:
      VITE_API_URL: https://sistema.gleb.scrb.org.br/api
    networks:
      - gleb-network
    restart: unless-stopped

volumes:
  postgres_data:
  backup_upload:

networks:
  gleb-network:
