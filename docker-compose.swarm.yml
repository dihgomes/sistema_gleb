version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    command: >
      sh -c "
      echo 'host all all all md5' > /tmp/pg_hba.conf &&
      docker-entrypoint.sh postgres -c hba_file=/tmp/pg_hba.conf
      "
    environment:
      POSTGRES_DB: gleb_db
      POSTGRES_USER: gleb_user
      POSTGRES_PASSWORD: GlebSecure2026Pass
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - backup_upload_v2:/backup
    networks:
      - gleb-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager

  backend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
      apk add --no-cache git openssl openssl-dev &&
      git clone https://github.com/dihgomes/sistema_gleb.git . &&
      cd backend &&
      echo 'Aguardando PostgreSQL inicializar...' &&
      sleep 15 &&
      npm install &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      node scripts/criarAdmin.js || true &&
      node src/server.js
      "
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://gleb_user:GlebSecure2026Pass@postgres:5432/gleb_db
      JWT_SECRET: 5e0d462036a3f8b0c97cba4517a01dd0a57748b3badbd02827c3a7dc8d0858a8eed70c3e5fa7a69932a9fca655229d735bbf4d74daea91d7a622c0a1474ca72f
      ADMIN_NOME: admin
      ADMIN_EMAIL: admin@gleb.scrb.org.br
      ADMIN_SENHA: AdminGleb2026Secure
      ADMIN_ROLE: admin
      FRONTEND_URL: https://gleb.scrb.org.br
    networks:
      - scrb
      - gleb-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=scrb"
        - "traefik.http.routers.gleb-backend.rule=Host(`gleb.scrb.org.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.gleb-backend.entrypoints=websecure"
        - "traefik.http.routers.gleb-backend.tls=true"
        - "traefik.http.routers.gleb-backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.gleb-backend.loadbalancer.server.port=3002"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
      apk add --no-cache git &&
      git clone https://github.com/dihgomes/sistema_gleb.git . &&
      cd frontend &&
      npm install &&
      npm run build &&
      npx http-server dist -p 3000 -a 0.0.0.0 --proxy http://localhost:3000? -c-1
      "
    environment:
      VITE_API_URL: https://gleb.scrb.org.br
    networks:
      - scrb
      - gleb-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=scrb"
        - "traefik.http.routers.gleb-frontend.rule=Host(`gleb.scrb.org.br`)"
        - "traefik.http.routers.gleb-frontend.entrypoints=websecure"
        - "traefik.http.routers.gleb-frontend.tls=true"
        - "traefik.http.routers.gleb-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.gleb-frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data_v2:
  backup_upload_v2:

networks:
  gleb-network:
    driver: overlay
  scrb:
    external: true
