version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backup_upload:/backup
    networks:
      - gleb-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager

  backend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
      apk add --no-cache git openssl openssl-dev &&
      git clone https://github.com/dihgomes/sistema_gleb.git . &&
      cd backend &&
      npm install &&
      npx prisma generate &&
      node src/server.js
      "
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SENHA: ${ADMIN_SENHA}
      FRONTEND_URL: https://gleb.scrb.org.br
    networks:
      - scrb
      - gleb-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=scrb"
        - "traefik.http.routers.gleb-backend.rule=Host(`gleb.scrb.org.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.gleb-backend.entrypoints=websecure"
        - "traefik.http.routers.gleb-backend.tls=true"
        - "traefik.http.routers.gleb-backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.gleb-backend.loadbalancer.server.port=3002"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
      apk add --no-cache git &&
      git clone https://github.com/dihgomes/sistema_gleb.git . &&
      cd frontend &&
      npm install &&
      npm run build &&
      npx http-server dist -p 3000 -a 0.0.0.0 --proxy http://localhost:3000? -c-1
      "
    environment:
      VITE_API_URL: https://gleb.scrb.org.br/api
    networks:
      - scrb
      - gleb-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=scrb"
        - "traefik.http.routers.gleb-frontend.rule=Host(`gleb.scrb.org.br`)"
        - "traefik.http.routers.gleb-frontend.entrypoints=websecure"
        - "traefik.http.routers.gleb-frontend.tls=true"
        - "traefik.http.routers.gleb-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.gleb-frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  backup_upload:

networks:
  gleb-network:
    driver: overlay
  scrb:
    external: true
